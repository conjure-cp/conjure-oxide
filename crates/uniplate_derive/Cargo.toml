[package]
name = "uniplate_derive"
version = "0.1.0"
edition = "2021"
description="Boilerplate-free generic operations on data, Haskell style."
license = "MPL-2.0"

[lib]
proc-macro = true

[dependencies]
proc-macro2 = "1.0.81"
syn = { version = "2.0.60", features = ["derive","parsing","printing","clone-impls","proc-macro","extra-traits"] }
quote = "1.0.36"
log = "0.4.21"
itertools = "0.12.1"
lazy_static = "1.4.0"

[lints.rust]
unstable_name_collisions = "allow"

[lints.clippy]
unwrap_used = "allow"
expect_used = "allow"
