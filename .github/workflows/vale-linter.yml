# Taken directly from the Vale GitHub Action documentation
# https://github.com/marketplace/actions/vale-linter

name: Vale Linter
on:
    pull_request_target:
        branches:
          - main
        paths:
          - "**/*.md"

permissions:
    pull-requests: write
    contents: read
    checks: write
jobs:
    vale:
        name: Vale Runner
        env:
            REVIEWDOG_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        runs-on: ubuntu-latest
        steps:
          - name: Checkout PR
            uses: actions/checkout@v6
            with:
                repository: ${{ github.event.pull_request.head.repo.full_name }}
                ref: ${{ github.event.pull_request.head.sha }}

          - uses: errata-ai/vale-action@v2.1.1
            with:
                # Restrict linting inputs to Markdown files only.
                files: .
                # Fail immediately when errors are found
                fail_on_error: true
                # Reporter is the way in which the CI shows you the errors in documentation.
                # For more information, check https://github.com/reviewdog/reviewdog?tab=readme-ov-file#reporters
                reporter: github-check
                # Keep reports focused on changed content in the PR diff.
                filter_mode: added
                # Vale CLI flags: set minimum alert level and scope to Markdown.
                vale_flags: "--minAlertLevel=error --no-wrap --glob=*.md"
