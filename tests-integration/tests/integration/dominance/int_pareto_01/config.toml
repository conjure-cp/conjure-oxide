parser = [
    "tree-sitter",
    # "via-conjure",
]

rewriter = [
    "naive",
    "morph",
    # Known-bad for dominance here: the morph sat-log runs produced silly outputs such as
    # x = -4, y = -4, which violates both the declared domains and x + y >= 2
]

comprehension-expander = [
    "native",
    "via-solver",
    "via-solver-ac",
]

solver = [
    "minion",
    "sat",
    "sat-log",
    # "sat-direct",
    # "sat-order",
    # "smt-bv-arrays-nodiscrete",
    # "smt-bv-arrays",
    # "smt-bv-atomic-nodiscrete",
    # "smt-bv-atomic",
    "smt-lia-arrays-nodiscrete",
    "smt-lia-arrays",
    "smt-lia-atomic-nodiscrete",
    "smt-lia-atomic",
]

validate-with-conjure = false
expected-time = 120
