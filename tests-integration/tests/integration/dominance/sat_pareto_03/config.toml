parser = [
    "tree-sitter",
    # "via-conjure",
]

rewriter = [
    "naive",
    "morph",
    # Known-bad for dominance here: the morph SAT variants collapsed to only the all-zero
    # assignment, which violates the model constraints
]

comprehension-expander = [
    "native",
    "via-solver",
    "via-solver-ac",
]

solver = [
    "minion",
    "sat",
    "sat-log",
    "sat-direct",
    "sat-order",
    "smt-bv-arrays-nodiscrete",
    "smt-bv-arrays",
    "smt-bv-atomic-nodiscrete",
    "smt-bv-atomic",
    "smt-lia-arrays-nodiscrete",
    "smt-lia-arrays",
    "smt-lia-atomic-nodiscrete",
    "smt-lia-atomic",
]

validate-with-conjure = false
